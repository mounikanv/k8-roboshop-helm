apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
# This makes it headless
 selector:
  component: redis
  project: roboshop
  tier: database 
 ports:
  - protocol: TCP 
    port: 6379
    targetPort: 6379